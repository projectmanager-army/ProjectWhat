<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Syne:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A2224;
    --surface: #0D2B2D;
    --surface2: #082022;
    --surface3: #061A1C;
    --border: rgba(255,255,255,0.08);
    --border-med: rgba(255,255,255,0.14);
    --text: #FFFBF0;
    --text-2: #D4CFBA;
    --text-3: #8A9688;
    --text-4: #607068;
    --text-5: #405050;
    --accent: #A7E000;
    --accent-light: rgba(167,224,0,0.12);
    --accent-text: #BFF020;
    --amber: #F59E0B;
    --amber-light: rgba(245,158,11,0.12);
    --amber-text: #FBB93A;
    --blue: #2196F3;
    --blue-light: rgba(33,150,243,0.12);
    --blue-text: #60B8FF;
    --red: #E74C3C;
    --red-light: rgba(231,76,60,0.12);
    --red-text: #FF6B6B;
    --purple: #A855F7;
    --purple-light: rgba(168,85,247,0.12);
    --purple-text: #C880FF;
    --teal: #10B981;
    --teal-light: rgba(16,185,129,0.12);
    --teal-text: #34D39A;
    --coral: #E67E22;
    --coral-light: rgba(230,126,34,0.12);
    --coral-text: #F0A050;
    --gray-light: rgba(255,255,255,0.06);
    --gray-text: #9A9080;
    --radius: 6px;
    --radius-lg: 10px;
    --radius-xl: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.4);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    --font-heading: 'Syne', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  h1,h2,h3{font-family:var(--font-heading)}

  /* Layout */
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50}
  .header-left{display:flex;align-items:center;gap:12px}
  .logo{font-size:15px;font-weight:600;letter-spacing:-0.3px;color:var(--text);font-family:var(--font-heading)}
  .logo span{color:var(--accent)}
  .year-badge{font-size:11px;font-weight:500;background:var(--accent-light);color:var(--accent-text);padding:2px 8px;border-radius:4px;font-family:'Inter',monospace}
  .header-right{display:flex;align-items:center;gap:8px}
  .icon-btn{width:32px;height:32px;border:1px solid var(--border-med);border-radius:var(--radius);background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
  .icon-btn:hover{background:var(--surface2);color:var(--text)}
  /* Dashboard */
  .dash-btn{font-size:12px;font-family:'Inter',sans-serif;padding:6px 12px;border:1px solid var(--border-med);border-radius:var(--radius);background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
  .dash-btn:hover,.dash-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  @keyframes dashSlide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .dash-panel{position:fixed;top:56px;left:0;right:0;z-index:45;background:var(--bg);border-bottom:2px solid var(--border-med);padding:20px 24px 24px;max-height:calc(100vh - 56px);overflow-y:auto;animation:dashSlide .18s ease}
  .dash-stat-grid{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
  .dash-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;flex:1;min-width:110px}
  .dash-stat-num{font-size:30px;font-weight:700;font-family:var(--font-heading);letter-spacing:-1.5px;line-height:1}
  .dash-stat-lbl{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin-top:5px}
  .dash-charts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .dash-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
  .dash-card-title{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px}
  .dash-bar-row{margin-bottom:9px}
  .dash-bar-labels{display:flex;justify-content:space-between;margin-bottom:3px}
  .dash-bar-name{font-size:11px;color:var(--text-2)}
  .dash-bar-val{font-size:11px;font-weight:600;font-family:'Inter',monospace;color:var(--text)}
  .dash-bar-track{height:6px;background:var(--border-med);border-radius:3px;overflow:hidden}
  .dash-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
  .dash-legend-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .dash-legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
  .dash-legend-name{font-size:11px;color:var(--text-2);flex:1}
  .dash-legend-val{font-size:11px;font-weight:600;font-family:'Inter',monospace;color:var(--text)}
  .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
  .mini-cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--text-4);padding:2px 0}
  .mini-cal-day{text-align:center;font-size:11px;padding:3px 2px;border-radius:4px;color:var(--text-2);position:relative;cursor:default}
  .mini-cal-day.today{background:var(--accent);color:#fff;font-weight:700;border-radius:50%}
  .mini-cal-day.has-ms::after{content:'';position:absolute;bottom:0px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--accent);opacity:.7}
  .mini-cal-day.today::after{background:#fff}

  .toolbar{padding:14px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
  .search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text-3)}
  .search-wrap input{width:100%;padding:7px 10px 7px 30px;font-size:13px;font-family:'Inter',sans-serif;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none}
  .search-wrap input:focus{border-color:var(--accent);background:var(--surface)}
  select.filter{font-size:12px;font-family:'Inter',sans-serif;padding:6px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);cursor:pointer;outline:none}
  select.filter:focus{border-color:var(--accent)}
  .divider{width:1px;height:24px;background:var(--border-med);margin:0 2px}
  .view-group{display:flex;background:var(--surface2);border-radius:var(--radius);padding:2px;gap:1px}
  .view-btn{font-size:12px;font-family:'Inter',sans-serif;padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
  .view-btn svg{width:13px;height:13px}
  .view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
  .btn-primary{font-size:12px;font-family:'Inter',sans-serif;padding:7px 14px;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
  .btn-primary:hover{opacity:0.9}
  .btn-export{font-size:11px;font-family:'Inter',sans-serif;padding:5px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
  .btn-export:hover{border-color:var(--accent);color:var(--accent)}
  #save-toast{position:fixed;bottom:20px;right:20px;background:#1a2e1a;border:1px solid #2e7d2e;color:#81c784;font-size:12px;font-family:'Inter',sans-serif;padding:7px 14px;border-radius:8px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;display:flex;align-items:center;gap:6px}
  .btn-secondary{font-size:12px;font-family:'Inter',sans-serif;padding:6px 12px;border:1px solid var(--border-med);border-radius:var(--radius);background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
  .btn-secondary:hover{background:var(--surface2);color:var(--text)}
  .btn-danger{font-size:11px;padding:4px 8px;border:1px solid var(--red-light);border-radius:var(--radius);background:var(--red-light);color:var(--red-text);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
  .btn-danger:hover{background:var(--red);color:#fff}


  .main{padding:20px 24px;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

  /* Table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column}
  .tbl-scroll{overflow-x:auto;overflow-y:auto;flex:1;min-height:0}
  table{width:auto;min-width:100%;border-collapse:collapse;font-size:13px}
  thead{position:sticky;top:0;z-index:10}
  th{padding:9px 12px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
  th.sortable{cursor:pointer}
  th.sortable:hover{color:var(--text)}
  td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)}
  .row-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  tr:hover .row-actions{opacity:1}

  /* Badges */
  .badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.02em;white-space:nowrap;font-family:'Inter',monospace}
  .priority-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
  .p-critical{background:var(--red-light);color:var(--red-text)}
  .p-high{background:var(--amber-light);color:var(--amber-text)}
  .p-medium{background:var(--blue-light);color:var(--blue-text)}
  .p-low{background:var(--gray-light);color:var(--gray-text)}
  .status-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid transparent}
  .status-pill:hover{transform:scale(1.02)}
  .s-live{background:var(--accent-light);color:var(--accent-text)}
  .s-hold{background:var(--amber-light);color:var(--amber-text)}
  .s-inprog{background:var(--blue-light);color:var(--blue-text)}
  .s-planned{background:var(--purple-light);color:var(--purple-text)}
  .s-done{background:var(--teal-light);color:var(--teal-text)}
  .s-tbc{background:var(--gray-light);color:var(--gray-text)}
  .cat-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap}
  .owner-avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:'Inter',monospace;background:var(--surface2);color:var(--text-2);border:1px solid var(--border-med)}
  .ms-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px;margin:1px;white-space:nowrap;border:1px solid transparent}
  .ms-shoot{background:var(--coral-light);color:var(--coral-text);border-color:rgba(0,0,0,0.05)}
  .ms-release{background:var(--accent-light);color:var(--accent-text);border-color:rgba(0,0,0,0.05)}
  .ms-edit{background:var(--blue-light);color:var(--blue-text);border-color:rgba(0,0,0,0.05)}
  .ms-pre{background:var(--purple-light);color:var(--purple-text);border-color:rgba(0,0,0,0.05)}
  .ms-travel{background:var(--amber-light);color:var(--amber-text);border-color:rgba(0,0,0,0.05)}
  .ms-other{background:var(--gray-light);color:var(--gray-text);border-color:rgba(0,0,0,0.05)}
  .ms-list{display:flex;flex-wrap:wrap;gap:2px}

  /* Table filter row */

  /* Inline cell editing */
  td.editable{cursor:pointer;position:relative}
  td.editable:hover{background:rgba(167,224,0,0.06)!important}
  td.editable:hover::after{content:'✏';position:absolute;top:50%;right:5px;transform:translateY(-50%);font-size:9px;opacity:.35;pointer-events:none}
  .inline-cell-input{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:5px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;padding:3px 7px;outline:none;box-sizing:border-box;min-width:80px}
  .inline-cell-input:focus{box-shadow:0 0 0 2px rgba(255,92,26,0.25)}
  textarea.inline-cell-input{resize:vertical;min-height:52px;line-height:1.4}
  select.inline-cell-input{cursor:pointer;padding-right:20px}

  /* Cards view */
  .cards-section{margin-bottom:24px}
  .section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .section-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3)}
  .section-count{font-size:11px;font-family:'Inter',monospace;background:var(--surface2);color:var(--text-3);padding:1px 6px;border-radius:4px}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:14px;cursor:pointer;transition:all .15s}
  .card:hover{border-color:var(--border-med);box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
  .card-name{font-size:13px;font-weight:500;line-height:1.35;color:var(--text)}
  .card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
  .card-owner{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:4px}
  .card-ms{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px}

  /* Timeline view */
  .timeline-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column}
  .tl-scroll{overflow-x:auto;overflow-y:auto;flex:1;min-height:0}
  .tl-table{border-collapse:collapse;font-size:12px;width:max-content;min-width:100%}
  .tl-table th{padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:12}
  .tl-table td{padding:7px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle}
  .tl-table tr:last-child td{border-bottom:none}
  .tl-table tr:hover td{background:var(--surface2)}
  /* Sticky columns — no internal vertical lines, GPU layer so bars never bleed through */
  .tl-table .sticky-col{position:sticky;z-index:20;background:var(--surface);border-right:none;will-change:transform;isolation:isolate}
  .tl-table tr:hover .sticky-col{background:var(--surface2)}
  .tl-table .col-proj{left:0;min-width:260px;max-width:260px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-table .col-status{left:260px;min-width:95px}
  /* col-sn is the last sticky col — one clean separator line on its right edge */
  .tl-table .col-sn{left:355px;min-width:170px;max-width:170px;font-size:11px;color:var(--text-2);cursor:pointer;border-right:2px solid var(--border-med)}
  .tl-table tr:hover .col-sn{background:var(--surface2)}
  .tl-table .col-sn .sn-placeholder{color:var(--text-4);font-style:italic;font-size:10px}
  .tl-month-cell{min-width:100px;max-width:120px}
  .tl-day-cell{text-align:center;padding:1px 0;border-right:1px solid var(--border);cursor:crosshair}
  .tl-controls{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
  .tl-zoom-group{display:flex;background:var(--surface2);border-radius:6px;padding:2px;gap:1px}
  .tl-zoom-btn{font-size:11px;font-family:'Inter',sans-serif;padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
  .tl-zoom-btn.active{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(167,224,0,0.4)}
  .tl-zoom-btn:hover:not(.active){color:var(--text-2);background:rgba(255,255,255,0.05)}
  .tl-phase-tabs{display:flex;gap:4px;align-items:center}
  .tl-phase-tab{font-size:11px;font-family:'Inter',sans-serif;font-weight:600;padding:4px 13px;border-radius:20px;border:1.5px solid var(--border-med);background:transparent;color:var(--text-3);cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.01em}
  .tl-phase-tab:hover:not(.active){color:var(--text-2);border-color:var(--accent);background:var(--accent-light)}
  .tl-phase-tab.active{background:var(--accent);color:#0A2224;border-color:var(--accent);box-shadow:0 1px 6px rgba(167,224,0,0.35)}
  .month-dot{display:flex;flex-direction:column;gap:2px}

  /* Empty */
  .empty{text-align:center;padding:48px 24px;color:var(--text-3)}
  .empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
  .empty-text{font-size:14px;font-weight:500;color:var(--text-2)}
  .empty-sub{font-size:12px;margin-top:4px}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px);padding:16px}
  .modal{background:var(--surface);border-radius:var(--radius-xl);border:1px solid var(--border-med);width:min(560px,100%);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);display:flex;flex-direction:column}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
  .modal-title{font-size:15px;font-weight:600;letter-spacing:-0.2px;font-family:var(--font-heading)}
  .modal-body{padding:18px 20px;flex:1;overflow-y:auto}
  .modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{margin-bottom:12px}
  .form-group.full{grid-column:1/-1}
  .form-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:5px}
  .form-input{width:100%;padding:8px 10px;font-size:13px;font-family:'Inter',sans-serif;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s}
  .form-input:focus{border-color:var(--accent);background:var(--surface)}
  textarea.form-input{min-height:70px;resize:vertical;line-height:1.5}
  .ms-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;flex-wrap:wrap}
  .ms-row .form-input{font-size:12px;padding:6px 8px}
  .ms-date-input{max-width:108px;flex-shrink:0}
  .ms-type-select{width:120px;flex-shrink:0}
  .ms-date-sep{font-size:11px;color:var(--text-4);flex-shrink:0}
  .add-ms-btn{font-size:11px;padding:5px 10px;border:1px dashed var(--border-med);border-radius:var(--radius);background:transparent;color:var(--text-3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-top:4px}
  .add-ms-btn:hover{border-color:var(--accent);color:var(--accent)}
  .ms-del-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .15s}
  .ms-del-btn:hover{background:var(--red-light);color:var(--red-text);border-color:transparent}

  /* Export toast */
  .toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:var(--bg);padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;z-index:200;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  /* Milestone edit popover */
  .ms-popover{position:fixed;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);z-index:400;padding:14px 16px;width:300px;font-family:'Inter',sans-serif}
  .ms-pop-type-row{margin-bottom:10px}
  .ms-pop-dates-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
  .ms-pop-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3);margin-bottom:10px}
  .ms-pop-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
  .ms-pop-row label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);display:block;margin-bottom:3px}
  .ms-pop-footer{display:flex;gap:6px;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
  .ms-chip-edit{cursor:pointer!important;pointer-events:all!important}
  .ms-chip-edit:hover{filter:brightness(.88);transform:scale(1.04)}
  .sort-icon{display:inline-block;margin-left:4px;opacity:.4}
  th.sort-asc .sort-icon::after{content:'↑';opacity:1}
  th.sort-desc .sort-icon::after{content:'↓';opacity:1}
  th .sort-icon::after{content:'↕'}
  
  /* Calendar */
  /* ── Calendar ─────────────────────────────────────────────────────────── */
  .cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;flex:1;min-height:0;display:flex;flex-direction:column}
  .cal-grid-wrap{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
  .cal-nav{display:flex;align-items:center;gap:20px;padding:14px 20px}
  .cal-nav-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;white-space:nowrap}
  .cal-nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
  .cal-legend-bar{display:flex;align-items:center;flex-wrap:wrap;gap:8px 14px;padding:8px 20px 10px;border-bottom:1px solid var(--border);background:var(--surface2)}
  .cal-legend{display:flex;align-items:center;flex-wrap:wrap;gap:8px 14px;font-size:10px;color:var(--text-3)}
  .cal-legend-item{display:flex;align-items:center;gap:5px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);align-items:start}
  .cal-dow{padding:8px 4px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);background:var(--surface2);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .cal-cell{height:150px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:default;transition:background .1s;vertical-align:top;display:flex;flex-direction:column}
  .cal-events{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border-med) transparent}
  .cal-events::-webkit-scrollbar{width:3px}
  .cal-events::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px}
  .cal-cell.empty-cell{background:var(--surface2);opacity:.4}
  .cal-cell.today-cell{background:rgba(167,224,0,0.05)}
  .cal-cell.drag-over{background:var(--blue-light)!important;outline:2px solid var(--blue);outline-offset:-2px}
  .cal-day-num{font-size:11px;font-weight:500;color:var(--text-3);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
  .cal-num-today{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--accent);color:#fff;border-radius:50%;font-size:11px;font-weight:700}
  .cal-add-btn{opacity:0;font-size:15px;background:none;border:none;color:var(--accent);cursor:pointer;padding:0 2px;line-height:1;border-radius:3px;transition:opacity .15s;flex-shrink:0}
  .cal-cell:hover .cal-add-btn{opacity:1}
  /* View toggle */
  .cal-view-toggle{display:flex;background:var(--surface2);border-radius:var(--radius);padding:2px;gap:1px;flex-shrink:0}
  .cal-view-btn{font-size:11px;font-family:'Inter',sans-serif;padding:4px 12px;border-radius:5px;border:none;background:transparent;color:var(--text-2);cursor:pointer;transition:all .15s;white-space:nowrap}
  .cal-view-btn.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
  /* Week view */
  .cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;min-height:0;border-top:1px solid var(--border)}
  .cal-week-col{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .cal-week-col:last-child{border-right:none}
  .cal-week-col.today-col{background:rgba(255,92,26,0.04)}
  .cal-week-col.drag-over{background:var(--blue-light)!important;outline:2px solid var(--blue);outline-offset:-2px}
  .cal-week-hdr{padding:10px 10px 8px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
  .cal-week-hdr-left{display:flex;flex-direction:column;gap:2px}
  .cal-week-dow{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-3)}
  .cal-week-date{font-size:22px;font-weight:700;font-family:var(--font-heading);line-height:1;color:var(--text)}
  .cal-week-date.today-num{color:var(--accent)}
  .cal-week-body{flex:1;overflow-y:auto;padding:6px;scrollbar-width:thin;scrollbar-color:var(--border-med) transparent}
  .cal-week-body::-webkit-scrollbar{width:3px}
  .cal-week-body::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:2px}
  .cal-week-col:hover .cal-add-btn{opacity:1}
  .cal-week-empty{font-size:10px;color:var(--text-4);padding:8px 0;text-align:center;font-style:italic}
  /* Live project — start card */
  .cal-ev-live{border-radius:6px;margin-bottom:4px;padding:5px 7px;cursor:pointer;transition:all .15s;border-left:3px solid transparent;word-break:break-word}
  .cal-ev-live:hover{filter:brightness(.88)}
  .cal-ev-live-start{background:rgba(255,255,255,0.06)}
  .cal-ev-live-mid{background:rgba(255,255,255,0.03);padding:3px 7px;opacity:.8}
  .cal-ev-live-end{background:rgba(255,255,255,0.03);padding:3px 7px;opacity:.7}
  .cal-ev-cat-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}
  .cal-ev-name{font-size:10px;font-weight:600;color:var(--text);white-space:normal;word-break:break-word;line-height:1.3;margin-bottom:1px}
  .cal-ev-name-sm{font-size:10px;font-weight:500;color:var(--text-2);white-space:normal;word-break:break-word;line-height:1.3}
  .cal-ev-meta{font-size:9px;color:var(--text-3);line-height:1.2;margin-top:1px;white-space:normal;word-break:break-word}
  .cal-ev-note{font-size:9px;color:var(--text-3);margin-top:2px;font-style:italic;white-space:normal;word-break:break-word;line-height:1.2;opacity:.8}
  .cal-ev-end-lbl{font-size:9px;opacity:.6;margin-left:4px}
  /* Milestone card */
  .cal-ev-ms-card{border-radius:4px;margin-bottom:2px;padding:3px 5px;cursor:grab;transition:all .15s;border-left:2px solid transparent;word-break:break-word;user-select:none}
  .cal-ev-ms-card:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.25)}
  .cal-ev-ms-card:active{cursor:grabbing}
  .cal-ev-ms-card.cal-dragging{opacity:.35;pointer-events:none}
  .cal-ev-ms-type{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px;white-space:normal;word-break:break-word}
  .cal-tip{position:fixed;z-index:99999;background:#1e1e2e;color:#f0f0f0;padding:8px 12px;border-radius:8px;font-size:11px;line-height:1.6;max-width:220px;pointer-events:none;display:none;box-shadow:0 4px 16px rgba(0,0,0,.3)}

  /* Settings modal tabs */
  .settings-tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .settings-tab{font-size:12px;font-family:'Inter',sans-serif;padding:10px 16px;border:none;background:transparent;color:var(--text-3);cursor:pointer;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
  .settings-tab:hover{color:var(--text)}
  .settings-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
  .sp{display:none}.sp.active{display:block}
  /* Category management modal */
  .cats-col-hdr{display:grid;grid-template-columns:56px 1fr 90px 108px 32px;gap:8px;padding:0 0 8px;border-bottom:2px solid var(--border-med);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);align-items:center}
  .cat-row{display:grid;grid-template-columns:56px 1fr 90px 108px 32px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .cat-row:last-child{border-bottom:none}
  /* Status / priority rows */
  .filter-item-hdr{display:grid;grid-template-columns:48px 1fr 108px 32px;gap:8px;padding:0 0 8px;border-bottom:2px solid var(--border-med);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);align-items:center}
  .filter-item-row{display:grid;grid-template-columns:48px 1fr 108px 32px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .filter-item-row:last-child{border-bottom:none}
  .filter-preview{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;font-size:10px;font-weight:500;border-radius:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px;pointer-events:none;width:100%;box-sizing:border-box}
  /* Owner rows */
  .owner-item-hdr{display:grid;grid-template-columns:28px 1fr 32px;gap:8px;padding:0 0 8px;border-bottom:2px solid var(--border-med);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);align-items:center}
  .owner-item-row{display:grid;grid-template-columns:28px 1fr 32px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .owner-item-row:last-child{border-bottom:none}
  .cat-preview{display:inline-flex;align-items:center;justify-content:center;padding:3px 6px;font-size:9px!important;font-weight:600;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none;width:100%;box-sizing:border-box;min-width:0}
  .cat-name-input,.cat-short-input{padding:6px 8px!important;font-size:12px!important}
  .cat-swatches{display:flex;flex-wrap:wrap;gap:4px;max-width:108px}
  .cat-swatch{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;outline:none;padding:0;flex-shrink:0;transition:transform .12s}
  .cat-swatch:hover{transform:scale(1.2)}
  .cat-swatch-sel{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--text)}
  .cat-del-btn{width:28px!important;height:28px!important;flex-shrink:0;border-radius:6px}
  .cat-del-btn:hover{color:var(--red-text)!important;background:var(--red-light)!important;border-color:transparent!important}
  .form-section{margin-bottom:0;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
  .form-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
  .form-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:10px}

  /* Responsive */
  @media(max-width:700px){
    .toolbar{padding:10px 12px}
    .main{padding:12px}
    .header{padding:0 12px}
    .form-grid{grid-template-columns:1fr}
    .cats-col-hdr,.cat-row{grid-template-columns:44px 1fr 70px 32px}
    .cat-swatches-col,.cats-hdr-swatches{display:none}
  }

/* ── Project Portal Panel ──────────────────────────────────────────────────── */
.portal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .22s ease}
.portal-backdrop.open{opacity:1;pointer-events:all}
.portal-panel{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:100vw;background:var(--bg);border-left:2px solid var(--border-med);z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;box-shadow:-12px 0 48px rgba(0,0,0,0.6)}
.portal-panel.open{transform:translateX(0)}
.portal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.portal-body{overflow-y:auto;flex:1;padding:20px 22px 32px;scrollbar-width:thin;scrollbar-color:var(--border-med) transparent}
.portal-stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.pstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.pstat-num{font-size:26px;font-weight:700;letter-spacing:-0.04em;line-height:1;font-family:var(--font-heading)}
.pstat-lbl{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-top:4px}
.pstat-sub{font-size:10px;color:var(--text-4);margin-top:2px}
.portal-sec-lbl{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.pcards{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .15s;overflow:hidden;display:flex;flex-direction:column}
.pcard:hover{border-color:var(--accent);box-shadow:0 6px 24px rgba(0,0,0,0.35);transform:translateY(-1px)}
.pcard-avatar{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;letter-spacing:.03em;flex-shrink:0}
.pcard-progress{height:6px;background:var(--border-med);border-radius:99px;overflow:hidden;margin-top:10px}
.pcard-progress-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.pcard-divider{height:1px;background:var(--border);margin:12px 0}
.pcard-stat-row{display:grid;grid-template-columns:repeat(4,1fr)}
.pcard-stat{text-align:center;padding:4px 0}
.pcard-stat+.pcard-stat{border-left:1px solid var(--border)}
.pcard-stat-n{font-size:16px;font-weight:700;letter-spacing:-0.02em;font-family:var(--font-heading);line-height:1}
.pcard-stat-l{font-size:9px;color:var(--text-4);text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.pcard-footer{display:flex;justify-content:space-between;align-items:flex-start;margin-top:auto;padding-top:10px;font-size:11px}
.pcard-tasks{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;display:none}
.pcard-tasks.open{display:block}
.pphase-lbl{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 5px}
.pphase-lbl:first-child{margin-top:0}
.ptask{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.ptask:last-child{border-bottom:none}
.ptask-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ptask-name{flex:1;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ptask-due{font-size:10px;color:var(--text-4);white-space:nowrap;margin-left:4px}
.ptask-badge{font-size:9px;padding:1px 7px;border-radius:99px;white-space:nowrap;font-weight:500;flex-shrink:0}
/* ── Client Project View ──────────────────────────────────────────────────── */
.cv-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:12px;flex-wrap:wrap}
.cv-back-btn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-3);padding:5px 10px;border-radius:6px;border:1px solid var(--border-med);background:transparent;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s,color .15s}
.cv-back-btn:hover{background:var(--hover);color:var(--text)}
.cv-tab-btn{font-size:11px;font-weight:600;padding:5px 13px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text-3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px}
.cv-tab-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border-med)}
.cv-tab-btn.active{background:var(--accent-light);color:var(--accent-text);border-color:rgba(167,224,0,0.3)}
.doc-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.doc-item:last-child{border-bottom:none}
.doc-item input[type="checkbox"]{opacity:0;transition:opacity .15s;flex-shrink:0}
.doc-item:hover input[type="checkbox"],.doc-item input[type="checkbox"]:checked{opacity:1}
.doc-type-badge{font-size:9px;font-weight:700;padding:3px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
.client-portal-wrap{max-width:680px;margin:0 auto;padding:48px 32px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Client-mode: hide admin-only controls */
body.client-mode #tb-add-btn,
body.client-mode #tb-add-divider,
body.client-mode #tb-export-btn,
body.client-mode #tb-import-btn,
body.client-mode #tb-manage-btn{display:none!important}
.doc-drop-zone{border:2px dashed var(--border-med);border-radius:10px;padding:32px 24px;text-align:center;transition:border-color .2s,background .2s;cursor:pointer;position:relative}
.doc-drop-zone:hover,.doc-drop-zone.drag-over{border-color:var(--accent);background:var(--accent-light)}
.doc-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.doc-pending-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.doc-pending-row:last-child{border-bottom:none}
.doc-name-edit{flex:1;background:transparent;border:none;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;outline:none;min-width:0}
.doc-name-edit:focus{color:var(--accent-text)}
/* Timeline row drag-to-reorder */
.tl-grip{width:16px;height:28px;display:inline-flex;align-items:center;justify-content:center;cursor:grab;color:var(--text-4);flex-shrink:0;opacity:.25;transition:opacity .12s;vertical-align:middle;margin-right:5px}
tr:hover .tl-grip{opacity:.8}
.tl-grip:hover{opacity:1!important;color:var(--accent)}
.tl-grip:active{cursor:grabbing}
tr.tl-row-dragging td{visibility:hidden!important}
#tl-drag-ghost{position:fixed;z-index:9999;pointer-events:none;background:var(--surface2);border:1.5px solid var(--accent);border-radius:7px;padding:6px 14px 6px 10px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.45);font-size:13px;font-family:'Inter',sans-serif;color:var(--text);white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis;opacity:.95;transform:rotate(1.5deg);}
#tl-drag-ghost .ghost-cat{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.tl-drop-indicator{position:fixed;left:0;right:0;height:3px;background:var(--accent);border-radius:2px;z-index:9998;pointer-events:none;box-shadow:0 0 8px var(--accent)}

/* ── LOGIN SCREEN ─────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}
#login-screen.wa-hidden{display:none}
.login-card{background:var(--surface);border:1px solid var(--border-med);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:20px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.login-logo{font-family:var(--font-heading);font-size:22px;font-weight:800;letter-spacing:-0.03em;text-align:center}
.login-logo span{color:var(--accent)}
.login-subtitle{font-size:12px;color:var(--text-3);text-align:center;margin-top:-12px}
.login-field{display:flex;flex-direction:column;gap:6px}
.login-field label{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.04em;text-transform:uppercase}
.login-field input{background:var(--surface2);border:1px solid var(--border-med);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--accent)}
.login-btn{background:var(--accent);color:#0A2224;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;padding:11px;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;letter-spacing:-.01em}
.login-btn:hover{opacity:.88}
.login-err{font-size:12px;color:var(--red-text);text-align:center;min-height:18px;transition:opacity .2s}
@keyframes wa-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.login-card.shake{animation:wa-shake .35s ease}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card" id="login-card">
    <div class="login-logo"><span style="font-style:italic;color:#fff">WHAT</span><span>ARMY</span></div>
    <div class="login-subtitle">Project Management Portal</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username" placeholder="Enter username" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="Enter password" onkeydown="if(event.key==='Enter')submitLogin()">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" onclick="submitLogin()">Sign In</button>
  </div>
</div>

<div class="app">

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="logo" style="font-weight:800;font-size:14px;letter-spacing:-0.02em"><span style="font-style:italic;color:#fff">WHATARMY</span> <span style="color:var(--accent);font-family:'Inter',sans-serif">2026</span></div>
    <button class="dash-btn" id="dash-btn" onclick="toggleDash()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="6" height="6" rx="1"></rect><rect x="9" y="1" width="6" height="6" rx="1"></rect><rect x="1" y="9" width="6" height="6" rx="1"></rect><rect x="9" y="9" width="6" height="6" rx="1"></rect></svg>
      Dashboard
    </button>
  </div>
  <div class="header-right">
<button id="cloud-header-btn" onclick="openCloudSettings()" title="Cloud storage settings"></button>
<button class="dash-btn" onclick="activeClientId?closeClientProject():showPortalHome()" title="Project Portal" style="gap:6px">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M1.5 13c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="11.5" cy="5.5" r="2" stroke="currentColor" stroke-width="1.4"/><path d="M13.5 13c0-1.657-.895-3.12-2.237-3.93" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
  Projects
</button>
    <button class="btn-secondary" onclick="downloadSnapshot()" title="Download index.html with all your data baked in — replace the file and run deploy.command to update the live site">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2v8M5 7l3 3 3-3M2 13h12"></path></svg>
      Publish
    </button>
    <button class="btn-secondary" onclick="exportCSV()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 10v3h12v-3M8 2v8M5 7l3 3 3-3"></path></svg>
      CSV
    </button>
    <button class="btn-secondary" onclick="logOut()" title="Sign out" style="color:var(--text-3)">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"></path></svg>
      Sign Out
    </button>
  </div>
</header>

<!-- Dashboard Panel -->
<div id="dash-panel" style="display:none"></div>
<div id="dash-backdrop" style="display:none;position:fixed;inset:0;z-index:44;background:rgba(0,0,0,.35)" onclick="closeDash()"></div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4.5"></circle><path d="M10.5 10.5l3 3"></path></svg>
    <input type="text" id="search" placeholder="Search items, owners…" oninput="render()">
  </div>
  <select class="filter" id="f-cat" onchange="render()">
    <option value="">All categories</option>
  <option value="Retail">Retail</option><option value="Digital">Digital</option><option value="Brand">Brand</option><option value="Trade Show">Trade Show</option><option value="Event">Event</option><option value="Launch">Launch</option></select>
  <select class="filter" id="f-status" onchange="render()">
    <option value="">All statuses</option>
  <option value="Planning">Planning</option><option value="Shoot">Shoot</option><option value="Live">Live</option><option value="Pending">Pending</option><option value="Blocked">Blocked</option></select>
  <select class="filter" id="f-priority" onchange="render()">
    <option value="">All priorities</option>
  <option value="Critical">Critical</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
  <select class="filter" id="f-owner" onchange="render()">
    <option value="">All owners</option>
  <option value="Amanda">Amanda</option><option value="Carlo">Carlo</option><option value="Caryn">Caryn</option><option value="Madison">Madison</option><option value="Paulina">Paulina</option><option value="Sabrina">Sabrina</option></select>
  <button id="tb-manage-btn" class="btn-secondary" onclick="openSettings('cats')" title="Manage filters">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="2.5"></circle><path d="M8 1v2.5M8 12.5v2.5M1 8h2.5M12.5 8H15M3.3 3.3l1.8 1.8M10.9 10.9l1.8 1.8M3.3 12.7l1.8-1.8M10.9 5.1l1.8-1.8"></path></svg>
    Manage
  </button>
  <div class="divider"></div>
  <div class="view-group">
    <button class="view-btn active" id="vb-timeline" onclick="setView('timeline')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M2 8h8M2 12h10"></path></svg>
      Timeline
    </button>
    <button class="view-btn" id="vb-table" onclick="setView('table')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="14" height="14" rx="2"></rect><path d="M1 5h14M1 9h14M5 5v9"></path></svg>
      Table
    </button>
    <button class="view-btn" id="vb-cal" onclick="setView('cal')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="2" width="14" height="13" rx="2"></rect><path d="M1 6h14M5 1v2M11 1v2"></path></svg>
      Calendar
    </button>
  </div>
  <button id="tb-export-btn" class="btn-export" onclick="exportData()" title="Download your data as a JSON backup file">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2v9M5 8l3 3 3-3M2 13h12"></path></svg>
    Export
  </button>
  <button id="tb-import-btn" class="btn-export" onclick="importData()" title="Restore data from a previously exported JSON file">
    <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 11V2M5 5l3-3 3 3M2 13h12"></path></svg>
    Import
  </button>
  <div id="tb-add-divider" class="divider"></div>
  <button id="tb-add-btn" class="btn-primary" onclick="openAdd()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v12M2 8h12"></path></svg>
    Add Item
  </button>
</div>
<div id="save-toast" style="opacity: 0;"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 8l4 4 8-8"></path></svg> Saved</div>


<!-- Main content -->
<div class="main" id="main-view"></div>
</div>

<!-- Add / Edit Project Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
<div class="modal" onclick="event.stopPropagation()">
  <div class="modal-header">
    <div class="modal-title" id="modal-title">Add Item</div>
    <button class="icon-btn" onclick="closeModal()" style="width:28px;height:28px">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group full">
        <label class="form-label">Project name</label>
        <input class="form-input" id="m-name" type="text" placeholder="e.g. Spring Campaign 2026">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="m-cat"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="m-status"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="m-priority"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Owner / Assignee</label>
        <select class="form-input" id="m-owner"></select>
      </div>
      <div class="form-group full">
        <label class="form-label">Status note</label>
        <input class="form-input" id="m-status-notes" type="text" placeholder="Current status update or note…">
      </div>
      <div class="form-group full">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="m-notes" placeholder="Details, links, or context…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Bar start date</label>
        <input class="form-input" id="m-start" type="text" placeholder="e.g. May 1">
      </div>
      <div class="form-group">
        <label class="form-label">Bar end date</label>
        <input class="form-input" id="m-end" type="text" placeholder="e.g. May 31">
      </div>
      <div class="form-group full">
        <label class="form-label">Milestones</label>
        <div id="ms-list"></div>
        <button class="add-ms-btn" onclick="addMsRow()">+ Add milestone</button>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-danger" id="modal-del-btn" onclick="deleteProject(editId)" style="display:none;margin-right:auto">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 4 13 4"/><path d="M6 4V2h4v2M5 4l1 10h4l1-10"/></svg>
      Delete
    </button>
    <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    <button class="btn-primary" id="modal-save-btn" onclick="saveProject()">Add Item</button>
  </div>
</div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettings()">
<div class="modal" onclick="event.stopPropagation()" style="max-width:660px;width:92vw;max-height:88vh">
  <div class="modal-header">
    <div class="modal-title">Manage filters</div>
    <button class="icon-btn" onclick="closeSettings()" style="width:28px;height:28px">✕</button>
  </div>
  <div class="settings-tabs">
    <button class="settings-tab active" id="stab-cats" onclick="setSettingsTab('cats')">Categories</button>
    <button class="settings-tab" id="stab-statuses" onclick="setSettingsTab('statuses')">Statuses</button>
    <button class="settings-tab" id="stab-priorities" onclick="setSettingsTab('priorities')">Priorities</button>
    <button class="settings-tab" id="stab-owners" onclick="setSettingsTab('owners')">Owners</button>
    <button class="settings-tab" id="stab-mstypes" onclick="setSettingsTab('mstypes')">Milestone Types</button>
  </div>
  <div class="modal-body">
    <div id="sp-cats" class="sp active">
      <div class="cats-col-hdr"><span>Preview</span><span>Name</span><span>Short label</span><span>Color</span><span></span></div>
      <div id="cats-list"></div>
      <button class="btn-secondary" onclick="addCat()" style="margin-top:14px;width:100%">+ Add category</button>
    </div>
    <div id="sp-statuses" class="sp">
      <div class="filter-item-hdr"><span>Preview</span><span>Name</span><span>Color</span><span></span></div>
      <div id="statuses-list"></div>
      <button class="btn-secondary" onclick="addStatus()" style="margin-top:14px;width:100%">+ Add status</button>
    </div>
    <div id="sp-priorities" class="sp">
      <div class="filter-item-hdr"><span>Preview</span><span>Name</span><span>Color</span><span></span></div>
      <div id="priorities-list"></div>
      <button class="btn-secondary" onclick="addPriority()" style="margin-top:14px;width:100%">+ Add priority</button>
    </div>
    <div id="sp-owners" class="sp">
      <div class="owner-item-hdr"><span></span><span>Name</span><span></span></div>
      <div id="owners-list"></div>
      <button class="btn-secondary" onclick="addOwner()" style="margin-top:14px;width:100%">+ Add owner</button>
    </div>
    <div id="sp-mstypes" class="sp">
      <div class="filter-item-hdr"><span>Color</span><span>Name</span><span></span></div>
      <div id="mstypes-list"></div>
      <button class="btn-secondary" onclick="addMsType()" style="margin-top:14px;width:100%">+ Add milestone type</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
    <button class="btn-primary" onclick="saveSettings()">Save</button>
  </div>
</div>
</div>

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTH_IDX={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
function parseDateNum(s){
  if(!s)return null;
  const FULL={January:1,February:2,March:3,April:4,May:5,June:6,July:7,August:8,September:9,October:10,November:11,December:12};
  const str=s.trim();
  // ISO format: 2026-04-16
  const iso=str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(iso)return parseInt(iso[2])*100+parseInt(iso[3]);
  // Numeric: 04/16 or 04/16/2026 or 4/16
  const num=str.match(/^(\d{1,2})\/(\d{1,2})/);
  if(num)return parseInt(num[1])*100+parseInt(num[2]);
  // "Mon D" or "Month D" or "Mon Dth"
  const parts=str.split(/[\s,]+/);
  if(parts.length<2)return null;
  const mo=MONTH_IDX[parts[0]]||FULL[parts[0]]||MONTH_IDX[parts[0].slice(0,3)];
  const d=parseInt(parts[1]);
  return(mo&&!isNaN(d))?mo*100+d:null;
}

// Pre-built ordered day list for index-based arithmetic across month boundaries
const ALL_DAYS=(()=>{
  const md=[{name:'Jan',days:31},{name:'Feb',days:28},{name:'Mar',days:31},{name:'Apr',days:30},{name:'May',days:31},{name:'Jun',days:30},{name:'Jul',days:31},{name:'Aug',days:31},{name:'Sep',days:30},{name:'Oct',days:31},{name:'Nov',days:30},{name:'Dec',days:31}];
  const a=[];
  md.forEach(m=>{for(let d=1;d<=m.days;d++)a.push({month:m.name,day:d,key:`${m.name} ${d}`,num:MONTH_IDX[m.name]*100+d});});
  return a;
})();
function dayNumToDate(num){
  if(!num)return'';
  const mo=Math.floor(num/100),day=num%100;
  const name=Object.keys(MONTH_IDX).find(k=>MONTH_IDX[k]===mo);
  return name?`${name} ${day}`:'';
}
function dayNumToIdx(num){return ALL_DAYS.findIndex(d=>d.num===num);}

function startBarDrag(e,id,type,anchorDn){

}

function startDraw(e,id,dn){
  if(e.button!==0)return;
  e.preventDefault();e.stopPropagation();
  drawState={id,startDn:dn,currentDn:dn};
  document.body.style.cursor='crosshair';
  document.body.style.userSelect='none';
  updateBarDOM(id,dn,dn);
}
function updateBarDOM(id,sn,en){
  const barEl=document.querySelector(`.gantt-bar[data-proj="${id}"]`);
  if(!barEl)return;
  if(!sn||!en){barEl.style.display='none';return;}
  const si=dayNumToIdx(sn),ei=dayNumToIdx(en);
  if(si<0||ei<0){barEl.style.display='none';return;}
  const _px=TL_ZOOM_PX[tlZoom]||24;
  barEl.style.display='';
  barEl.style.left=(si*_px)+'px';
  barEl.style.width=((ei-si+1)*_px)+'px';
}
document.addEventListener('mousemove',e=>{
  if(!dragState&&!drawState)return;
  const cell=document.elementFromPoint(e.clientX,e.clientY)?.closest('td[data-dn]');
  if(!cell)return;
  const dn=parseInt(cell.dataset.dn);if(isNaN(dn))return;
  if(dragState){
    if(dn===dragState.lastDn)return;
    dragState.lastDn=dn;
    const p=projects.find(x=>x.id===dragState.id);if(!p)return;
    let sn,en;
    if(dragState.type==='move'){
      const delta=dayNumToIdx(dn)-dayNumToIdx(dragState.anchorDn);
      const si=dayNumToIdx(dragState.origSn)+delta,ei=dayNumToIdx(dragState.origEn)+delta;
      if(si<0||ei>=ALL_DAYS.length)return;
      sn=ALL_DAYS[si].num;en=ALL_DAYS[ei].num;
    }else if(dragState.type==='left'){
      sn=dn;en=dragState.origEn;if(sn>en)return;
    }else{
      sn=dragState.origSn;en=dn;if(en<sn)return;
    }
    p.startDate=dayNumToDate(sn);p.endDate=dayNumToDate(en);
    updateBarDOM(dragState.id,sn,en);
  }else if(drawState){
    if(dn===drawState.currentDn)return;
    drawState.currentDn=dn;
    const minDn=Math.min(drawState.startDn,dn);
    const maxDn=Math.max(drawState.startDn,dn);
    updateBarDOM(drawState.id,minDn,maxDn);
  }
});
document.addEventListener('mouseup',()=>{
  if(dragState){
    dragState=null;
    document.body.style.cursor='';document.body.style.userSelect='';
    render();showToast('Dates updated');
  }else if(drawState){
    const wasDragged=drawState.startDn!==drawState.currentDn;
    const minDn=Math.min(drawState.startDn,drawState.currentDn);
    const maxDn=Math.max(drawState.startDn,drawState.currentDn);
    const p=projects.find(x=>x.id===drawState.id);
    drawState=null;
    document.body.style.cursor='';document.body.style.userSelect='';
    if(wasDragged&&p){p.startDate=dayNumToDate(minDn);p.endDate=dayNumToDate(maxDn);render();showToast('Bar set');}
  }
});

  const fs=document.getElementById('f-status').value;
  const fp=document.getElementById('f-priority').value;
  const fo=document.getElementById('f-owner').value;
  return projects.filter(p=>{
    if(activeClientId&&(p.clientId||'atp')!==activeClientId)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!p.cat.toLowerCase().includes(q)&&!(p.owner||'').toLowerCase().includes(q)&&!(p.notes||'').toLowerCase().includes(q))return false;
    if(fc&&p.cat!==fc)return false;
    if(fs&&p.status!==fs)return false;
    if(fp&&p.priority!==fp)return false;
    if(fo&&p.owner!==fo)return false;
    return true;
  });
}
function getSorted(arr){
  return [...arr].sort((a,b)=>{
    let av=a[sortCol]||'',bv=b[sortCol]||'';
    if(sortCol==='priority'){
      const pi=x=>priorities.findIndex(p=>p.name===x);
      return(pi(av)-pi(bv))*sortDir;
    }
    return av.localeCompare(bv)*sortDir;
  });
}
function setSort(col){
  if(sortCol===col)sortDir*=-1;
  else{sortCol=col;sortDir=1;}
  render();
}

function openMsEdit(projId,msIdx,anchor){
  document.querySelectorAll('.ms-popover').forEach(p=>p.remove());
  const proj=projects.find(x=>x.id===projId);if(!proj)return;
  const ms=proj.milestones[msIdx];if(!ms)return;
  const typeOpts=milestoneTypes.map(t=>`<option${t.name===ms.event?' selected':''}>${t.name}</option>`).join('');
  const pop=document.createElement('div');
  pop.className='ms-popover';
  const lbl='font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:4px';
  pop.innerHTML=`
    <div class="ms-pop-title">Edit milestone</div>
    <div style="margin-bottom:10px">
      <div style="${lbl}">Type</div>
      <select class="form-input ms-pop-type" style="width:100%">${typeOpts}</select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div>
        <div style="${lbl}">Start date</div>
        <input class="form-input ms-pop-date" type="date" value="${_msDateToInput(ms.date)}" style="width:100%;box-sizing:border-box">
      </div>
      <div>
        <div style="${lbl}">End <span style="font-weight:400;text-transform:none;opacity:.55">(opt)</span></div>
        <input class="form-input ms-pop-enddate" type="date" value="${_msDateToInput(ms.endDate||'')}" style="width:100%;box-sizing:border-box">
      </div>
    </div>
    <div class="ms-pop-footer">
      <button class="btn-danger" style="font-size:11px;padding:4px 10px" onmousedown="event.stopPropagation()" onclick="deleteMsEdit(${projId},${msIdx})">Delete</button>
      <button class="btn-primary" style="font-size:11px;padding:4px 10px" onmousedown="event.stopPropagation()" onclick="saveMsEdit(${projId},${msIdx},this.closest('.ms-popover'))">Save</button>
    </div>`;
  document.body.appendChild(pop);
  const rect=anchor.getBoundingClientRect();
  const pw=pop.offsetWidth||300;
  const ph=pop.offsetHeight||180;
  let left=rect.left;let top=rect.bottom+6;
  if(left+pw>window.innerWidth-8)left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight-8)top=rect.top-ph-6;
  pop.style.left=Math.max(8,left)+'px';pop.style.top=Math.max(8,top)+'px';
  setTimeout(()=>document.addEventListener('mousedown',function h(e){if(!pop.contains(e.target)){pop.remove();document.removeEventListener('mousedown',h);}},{capture:true}),0);
}
function saveMsEdit(projId,msIdx,pop){
  const proj=projects.find(x=>x.id===projId);if(!proj)return;
  const ms=proj.milestones[msIdx];if(!ms)return;
  const rawDate=pop.querySelector('.ms-pop-date').value.trim();
  const rawEndDate=pop.querySelector('.ms-pop-enddate').value.trim();
  const newType=pop.querySelector('.ms-pop-type').value;
  if(!rawDate)return;
  const newDate=rawDate.includes('-')?_inputToMsDate(rawDate):rawDate;
  const newEndDate=rawEndDate?(rawEndDate.includes('-')?_inputToMsDate(rawEndDate):rawEndDate):'';
  ms.date=newDate;ms.endDate=newEndDate||null;ms.event=newType;
  pop.remove();persist();render();showToast('Milestone updated');
}
function deleteMsEdit(projId,msIdx){
  const proj=projects.find(x=>x.id===projId);if(!proj)return;
  proj.milestones.splice(msIdx,1);
  document.querySelectorAll('.ms-popover').forEach(p=>p.remove());
  render();showToast('Milestone deleted');
}

    if(newTbl){newTbl.scrollLeft=savedTblL;newTbl.scrollTop=savedTblT;}
  }
  persist();
}

function renderStats(data){
  const total=data.length;
  const byStatus={};
  data.forEach(p=>{byStatus[p.status]=(byStatus[p.status]||0)+1;});
  const shoots=data.flatMap(p=>p.milestones).filter(m=>(m.event||'').toLowerCase().includes('shoot')).length;
  const upcoming=data.flatMap(p=>p.milestones).filter(m=>m.date!=='2027').length;
  const critical=data.filter(p=>p.priority==='Critical').length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-item"><div class="stat-num">${total}</div><div class="stat-lbl">Projects</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--accent-text)">${byStatus['Live']||0}</div><div class="stat-lbl">Live</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--blue-text)">${byStatus['Planning']||0}</div><div class="stat-lbl">Planning</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--coral-text)">${byStatus['Shoot']||0}</div><div class="stat-lbl">Shoot</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--red-text)">${critical}</div><div class="stat-lbl">Critical</div></div>
    <div class="stat-item"><div class="stat-num">${shoots}</div><div class="stat-lbl">Shoots</div></div>
    <div class="stat-item"><div class="stat-num">${upcoming}</div><div class="stat-lbl">Milestones</div></div>
  `;
}

function inlineEdit(e, projId, field){
  e.stopPropagation();
  const td=e.currentTarget;
  if(td.querySelector('.inline-cell-input'))return; // already editing
  const p=projects.find(x=>x.id===projId);
  if(!p)return;

  function save(val){
    if(field==='cat'){p.cat=val;}
    else if(field==='status'){p.status=val;}
    else if(field==='priority'){p.priority=val;}
    else if(field==='name'){p.name=val.trim()||p.name;}
    else if(field==='owner'){
      p.owner=val.trim();
      if(p.owner&&!teamMembers.includes(p.owner))teamMembers.push(p.owner);
    }
    else if(field==='notes'){p.notes=val.trim();}
    else if(field==='statusNotes'){p.statusNotes=val.trim();}
    render();
  }

  function cancel(){render();}

  let el;
  if(field==='cat'){
    el=document.createElement('select');
    el.className='inline-cell-input';
    categories.forEach(c=>{
      const o=document.createElement('option');
      o.value=c.name;o.textContent=c.name;
      if(c.name===p.cat)o.selected=true;
      el.appendChild(o);
    });
    el.onchange=()=>save(el.value);
    el.onblur=()=>save(el.value);
    el.onkeydown=ev=>{if(ev.key==='Escape')cancel();};
  } else if(field==='status'){
    el=document.createElement('select');
    el.className='inline-cell-input';
    statuses.forEach(s=>{
      const o=document.createElement('option');
      o.value=s.name;o.textContent=s.name;
      if(s.name===p.status)o.selected=true;
      el.appendChild(o);
    });
    el.onchange=()=>save(el.value);
    el.onblur=()=>save(el.value);
    el.onkeydown=ev=>{if(ev.key==='Escape')cancel();};
  } else if(field==='priority'){
    el=document.createElement('select');
    el.className='inline-cell-input';
    priorities.forEach(pr=>{
      const o=document.createElement('option');
      o.value=pr.name;o.textContent=pr.name;
      if(pr.name===p.priority)o.selected=true;
      el.appendChild(o);
    });
    el.onchange=()=>save(el.value);
    el.onblur=()=>save(el.value);
    el.onkeydown=ev=>{if(ev.key==='Escape')cancel();};
  } else if(field==='owner'){
    el=document.createElement('select');
    el.className='inline-cell-input';
    const none=document.createElement('option');
    none.value='';none.textContent='— None —';
    if(!p.owner)none.selected=true;
    el.appendChild(none);
    [...new Set(teamMembers)].sort().forEach(m=>{
      const o=document.createElement('option');
      o.value=m;o.textContent=m;
      if(m===p.owner)o.selected=true;
      el.appendChild(o);
    });
    // Allow typing a new owner not in the list
    const typeOpt=document.createElement('option');
    typeOpt.value='__new__';typeOpt.textContent='+ Type new name…';
    el.appendChild(typeOpt);
    el.onchange=()=>{
      if(el.value==='__new__'){
        const name=prompt('Enter owner name:','');
        if(name&&name.trim()){save(name.trim());}else{cancel();}
      } else {
        save(el.value);
      }
    };
    el.onblur=()=>{if(el.value!=='__new__')save(el.value);};
    el.onkeydown=ev=>{if(ev.key==='Escape')cancel();};
  } else if(field==='notes'){
    el=document.createElement('textarea');
    el.className='inline-cell-input';
    el.value=p.notes||'';
    el.onblur=()=>save(el.value);
    el.onkeydown=ev=>{
      if(ev.key==='Escape'){ev.preventDefault();cancel();}
      if(ev.key==='Enter'&&(ev.metaKey||ev.ctrlKey)){save(el.value);}
    };
  } else {
    // name or statusNotes — single-line text input
    el=document.createElement('input');
    el.type='text';
    el.className='inline-cell-input';
    el.value=field==='statusNotes'?(p.statusNotes||''):(p.name||'');
    if(field==='statusNotes')el.placeholder='Add status note…';
    el.onblur=()=>save(el.value);
    el.onkeydown=ev=>{
      if(ev.key==='Enter'){el.blur();}
      if(ev.key==='Escape'){ev.preventDefault();cancel();}
    };
  }

  td.innerHTML='';
  td.appendChild(el);
  el.focus();
  if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.select();
}

function renderTable(data){
  if(!data.length)return emptyState('No projects match your current filters.');
  const sortTh=(col,lbl)=>{
    const active=sortCol===col;
    const cls=`sortable${active?(sortDir===1?' sort-asc':' sort-desc'):''}`;
    return `<th class="${cls}" onclick="setSort('${col}')">${lbl}<span class="sort-icon"></span></th>`;
  };
  const rows=data.map(p=>`
    <tr>
      <td class="editable" onclick="inlineEdit(event,${p.id},'cat')" title="Click to edit category"><span class="cat-badge" style="${catStyle(p.cat)}">${p.cat}</span></td>
      <td class="editable" onclick="inlineEdit(event,${p.id},'name')" style="font-weight:400;max-width:200px;min-width:150px" title="Click to edit name">${p.name}</td>
      <td class="editable" onclick="inlineEdit(event,${p.id},'status')" title="Click to edit status"><span class="status-pill" style="${statusStyle(p.status)}">${p.status}</span></td>
      <td class="editable" onclick="inlineEdit(event,${p.id},'priority')" title="Click to edit priority"><span class="priority-badge" style="${priorityStyle(p.priority)}">${priorityDot(p.priority)} ${p.priority}</span></td>
      <td class="editable" onclick="inlineEdit(event,${p.id},'owner')" title="Click to edit owner" style="max-width:110px;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ownerAvatar(p.owner)||'<span style="color:var(--text-3);font-size:11px">—</span>'} ${p.owner?`<span style="font-size:12px;color:var(--text-2)">${p.owner}</span>`:''}</td>
      <td class="editable" onclick="openEdit(${p.id})" title="Click to edit milestones" style="max-width:140px;min-width:80px"><div class="ms-list">${p.milestones.map(m=>`<span class="ms-chip ${msClass(m.event)}">${m.date} · ${m.event}</span>`).join('')||'<span style="color:var(--text-3);font-size:11px">—</span>'}</div></td>
      <td class="editable" onclick="inlineEdit(event,${p.id},'statusNotes')" style="min-width:160px;max-width:220px;color:var(--text-2);font-size:11px" title="Click to edit status">${(p.statusNotes||'').slice(0,60)+((p.statusNotes||'').length>60?'…':'')}</td>
      <td><div class="row-actions">
        <button class="btn-secondary" onclick="openEdit(${p.id})" style="padding:3px 8px;font-size:11px">Edit</button>
        <button class="btn-danger" onclick="deleteProject(${p.id})">✕</button>
      </div></td>
    </tr>`).join('');
  return `<div class="table-wrap"><div class="tbl-scroll"><table>
    <thead><tr>
      ${sortTh('cat','Category')}${sortTh('name','Item')}${sortTh('status','Status')}${sortTh('priority','Priority')}
      <th>Owner</th><th>Milestones</th><th>Notes</th><th style="width:1px;white-space:nowrap"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}



function catColor(catName){
  const cat=categories.find(x=>x.name===catName);
  return cat?CAT_HEX[cat.color]||'#9A9080':'#9A9080';
}
function statusColorHex(s){
  const st=statuses.find(x=>x.name===s);
  return st?CAT_HEX[st.color]||'#9A9080':'#9A9080';
}

function tlNoteEdit(e,projId){
